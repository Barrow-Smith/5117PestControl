<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Pest Control Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">
<style>
  :root {
    --color-bg: #f7f6f2;
    --color-surface: #ffffff;
    --color-surface-2: #fbfbf9;
    --color-border: #e3e0da;
    --color-text: #28251d;
    --color-text-muted: #6f6c66;
    --color-text-faint: #a6a29a;
    --color-accent: #01696f;
    --color-accent-hover: #0c4e54;
    --color-ok: #437a22;
    --color-warn: #b07a00;
    --color-overdue: #a12c7b;
    --radius-md: 0.5rem;
    --radius-lg: 0.75rem;
    --radius-full: 9999px;
    --space-2: 0.5rem;
    --space-3: 0.75rem;
    --space-4: 1rem;
    --space-6: 1.5rem;
    --space-8: 2rem;
    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'Work Sans', -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    background: var(--color-bg);
    color: var(--color-text);
    padding: var(--space-6) var(--space-4);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1100px; margin: 0 auto; }
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: var(--space-4);
    margin-bottom: var(--space-6);
  }
  h1 {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: clamp(1.5rem, 1.2rem + 1.5vw, 2rem);
    color: var(--color-text);
  }
  .subtitle {
    color: var(--color-text-muted);
    font-size: 0.9rem;
    margin-top: 4px;
  }
  .sync-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.8rem;
    padding: 6px 12px;
    border-radius: var(--radius-full);
    background: var(--color-surface-2);
    border: 1px solid var(--color-border);
    color: var(--color-text-muted);
  }
  .sync-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--color-text-faint);
  }
  .sync-pill.connecting .sync-dot { background: var(--color-warn); }
  .sync-pill.synced .sync-dot { background: var(--color-ok); }
  .sync-pill.error .sync-dot { background: var(--color-overdue); }

  .banner {
    background: #fff4f7;
    border: 1px solid var(--color-overdue);
    color: #6d1c4f;
    border-radius: var(--radius-md);
    padding: var(--space-4);
    margin-bottom: var(--space-6);
    font-size: 0.9rem;
    display: none;
  }
  .banner button {
    margin-top: var(--space-2);
    background: var(--color-overdue);
    color: #fff;
    border: none;
    padding: 6px 14px;
    border-radius: var(--radius-md);
    font-size: 0.85rem;
    cursor: pointer;
  }

  .filters { display: flex; gap: var(--space-2); margin-bottom: var(--space-6); flex-wrap: wrap; }
  .filters button {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    color: var(--color-text);
    padding: 8px 16px;
    border-radius: var(--radius-full);
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .filters button.active { background: var(--color-accent); color: #fff; border-color: var(--color-accent); }
  .filters button:hover:not(.active) { border-color: var(--color-accent); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(300px, 100%), 1fr));
    gap: var(--space-4);
  }
  .section-label {
    grid-column: 1 / -1;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--color-text-faint);
    margin: var(--space-4) 0 -4px;
  }
  .section-label:first-child { margin-top: 0; }

  .card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: var(--space-4) var(--space-4) var(--space-4);
    box-shadow: 0 1px 2px rgba(40,37,29,0.04);
  }
  .card-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 2px; }
  .card-meta { font-size: 0.78rem; color: var(--color-text-muted); margin-bottom: var(--space-3); }
  .status-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 0.72rem; font-weight: 600;
    padding: 3px 10px; border-radius: var(--radius-full);
    margin-bottom: var(--space-3);
  }
  .status-badge.ok { background: #eef3e7; color: var(--color-ok); }
  .status-badge.warn { background: #fbf1de; color: var(--color-warn); }
  .status-badge.overdue { background: #f7e6ee; color: var(--color-overdue); }
  .status-badge.offseason { background: var(--color-surface-2); color: var(--color-text-faint); }

  .row { font-size: 0.82rem; margin: 4px 0; color: var(--color-text); }
  .row b { color: var(--color-text-muted); font-weight: 500; }

  .actions { margin-top: var(--space-3); display: flex; gap: var(--space-2); }
  .actions button {
    flex: 1; padding: 9px 0; border-radius: var(--radius-md);
    border: none; cursor: pointer; font-size: 0.82rem; font-weight: 600;
    transition: background 0.15s, opacity 0.15s;
  }
  .btn-done { background: var(--color-accent); color: #fff; }
  .btn-done:hover { background: var(--color-accent-hover); }
  .btn-done:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-hist { background: transparent; border: 1px solid var(--color-border); color: var(--color-text); }
  .btn-hist:hover { border-color: var(--color-accent); }

  .hist-panel {
    display: none; margin-top: var(--space-3); font-size: 0.78rem;
    color: var(--color-text-muted); border-top: 1px solid var(--color-border);
    padding-top: var(--space-2); max-height: 100px; overflow-y: auto;
  }
  .hist-panel div { margin: 2px 0; }

  .empty-state {
    grid-column: 1 / -1; text-align: center; padding: var(--space-8);
    color: var(--color-text-muted);
  }

  @media (min-width: 44px) {}
</style>
</head>
<body>

<div class="wrap">
  <div class="top-bar">
    <div>
      <h1>Home Pest Control Tracker</h1>
      <div class="subtitle">1981 brick home &middot; Charlotte, NC &middot; Crawlspace + wooded lot program</div>
    </div>
    <span id="syncPill" class="sync-pill connecting"><span class="sync-dot"></span><span id="syncText">Connecting</span></span>
  </div>

  <div id="errorBanner" class="banner"></div>

  <div class="filters">
    <button class="active" data-f="all">All</button>
    <button data-f="overdue">Overdue</button>
    <button data-f="warn">Due soon</button>
    <button data-f="ok">On track</button>
  </div>

  <div id="grid" class="grid"></div>
</div>

<script>
(function() {
  'use strict';

  var SUPABASE_URL = "https://jfbgmciunsnmmrmkogtf.supabase.co";
  var SUPABASE_KEY = "sb_publishable_WItbLaieW0Vqc362h3S1Bw_SoAZHgUw";
  var REST_URL = SUPABASE_URL + "/rest/v1/pest_logs";
  var HEADERS = {
    "apikey": SUPABASE_KEY,
    "Authorization": "Bearer " + SUPABASE_KEY,
    "Content-Type": "application/json",
    "Prefer": "return=representation"
  };

  var TASKS = [
    { id:"bifenthrin_perimeter", title:"Perimeter Barrier — Bifenthrin 7.9%", category:"Perimeter", freqDays:30, product:"Bifenthrin 7.9% concentrate", mix:"0.5 fl oz/gal routine · 1 fl oz/gal near woods/fence line", how:"Spray 3ft band up foundation + 3ft out on ground, windows, doors, garage frame", seasonal:false },
    { id:"fipronil_crawlspace", title:"Crawlspace/Foundation — Fipronil Plus C 0.65%", category:"Perimeter", freqDays:75, product:"Fipronil Plus C 0.65% concentrate", mix:"1 fl oz per gallon of water", how:"Spray crawlspace vents, foundation gaps, and garage door seams", seasonal:false },
    { id:"yard_granules", title:"Yard Granules — Bifenthrin", category:"Perimeter", freqDays:30, product:"Bifenthrin granules (~0.2%)", mix:"Ready-to-use, spreader on labeled yard-size setting", how:"Broadcast across yard and mulch beds, heavier near wooded border", seasonal:false },
    { id:"alpine_indoor", title:"Indoor/Garage Spray — Alpine WSG", category:"Indoor", freqDays:75, product:"Alpine WSG (10g packet)", mix:"1 packet per gallon of water", how:"Baseboards, under sinks, behind appliances, garage door seams", seasonal:false },
    { id:"gel_bait", title:"Ant & Roach Gel Bait — Advion", category:"Indoor", freqDays:45, product:"Advion Ant Gel + Advion Cockroach Gel", mix:"Ready-to-use, no mixing", how:"Pea-sized dabs in cracks, corners, under appliances", seasonal:false },
    { id:"mosquito_dunks", title:"Mosquito Dunks — Standing Water", category:"Mosquito", freqDays:30, product:"Mosquito Dunks (Bti)", mix:"1 dunk per 100 sq ft of water surface", how:"Drop into dry creek bed puddles / standing water spots", seasonal:true, seasonStart:4, seasonEnd:10 },
    { id:"mosquito_barrier", title:"Mosquito Barrier Spray — Bifenthrin", category:"Mosquito", freqDays:25, product:"Bifenthrin 7.9% concentrate", mix:"1 fl oz per gallon of water", how:"Spray shrubs, tall grass, shaded areas along tree line", seasonal:true, seasonStart:4, seasonEnd:10 },
    { id:"wasp_check", title:"Wasp Nest Check", category:"Wasps", freqDays:30, product:"Spectracide / PT Ultra Wasp Freeze (as needed)", mix:"Ready-to-use aerosol, no mixing", how:"Inspect eaves, garage rafters, fence lines; treat any nest at dusk", seasonal:true, seasonStart:3, seasonEnd:8 },
    { id:"crawlspace_traps", title:"Crawlspace Trap Check", category:"Rodent", freqDays:30, product:"Snap traps / glue boards", mix:"Pre-loaded, no mixing", how:"Check traps near pipe/vent penetrations, reset as needed", seasonal:false },
    { id:"rodent_stations", title:"Exterior Rodent Bait Stations", category:"Rodent", freqDays:60, product:"Tomcat / Protecta LP bait stations", mix:"Pre-loaded blocks, no mixing", how:"Place/refresh along exterior foundation, ahead of fall/winter", seasonal:true, seasonStart:9, seasonEnd:12 }
  ];

  var logData = {};
  var currentFilter = "all";

  function setSyncStatus(state, text) {
    var pill = document.getElementById("syncPill");
    pill.className = "sync-pill " + state;
    document.getElementById("syncText").textContent = text;
  }

  function showError(msg) {
    var el = document.getElementById("errorBanner");
    el.innerHTML = escapeHtml(msg) + '<br><button id="retryBtn">Retry connection</button>';
    el.style.display = "block";
    document.getElementById("retryBtn").addEventListener("click", start);
  }

  function hideError() {
    document.getElementById("errorBanner").style.display = "none";
  }

  function escapeHtml(str) {
    var div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  function daysBetween(a, b) {
    return Math.round((b - a) / 86400000);
  }

  function isInSeason(task) {
    if (!task.seasonal) return true;
    var m = new Date().getMonth() + 1;
    return m >= task.seasonStart && m <= task.seasonEnd;
  }

  function getStatus(task) {
    var log = logData[task.id] || [];
    var last = log.length ? log[log.length - 1] : null;
    if (!isInSeason(task)) return { status: "offseason", daysLeft: null, last: last };
    if (!last) return { status: "overdue", daysLeft: 0, last: null };
    var daysSince = daysBetween(new Date(last), new Date());
    var daysLeft = task.freqDays - daysSince;
    var status = "ok";
    if (daysLeft <= 0) status = "overdue";
    else if (daysLeft <= 5) status = "warn";
    return { status: status, daysLeft: daysLeft, last: last };
  }

  function render() {
    var grid = document.getElementById("grid");
    grid.innerHTML = "";
    var categories = [];
    TASKS.forEach(function(t) { if (categories.indexOf(t.category) === -1) categories.push(t.category); });

    var anyVisible = false;

    categories.forEach(function(cat) {
      var catTasks = TASKS.filter(function(t) { return t.category === cat; });
      var visibleTasks = catTasks.filter(function(t) {
        var s = getStatus(t).status;
        return currentFilter === "all" || s === currentFilter;
      });
      if (visibleTasks.length === 0) return;
      anyVisible = true;

      var label = document.createElement("div");
      label.className = "section-label";
      label.textContent = cat;
      grid.appendChild(label);

      visibleTasks.forEach(function(task) {
        var s = getStatus(task);
        var card = document.createElement("div");
        card.className = "card";

        var statusText = "";
        if (s.status === "offseason") statusText = "Off-season";
        else if (s.status === "overdue") statusText = s.last ? ("Overdue by " + (-s.daysLeft) + "d") : "Never logged";
        else if (s.status === "warn") statusText = "Due in " + s.daysLeft + "d";
        else statusText = "On track (" + s.daysLeft + "d left)";

        var log = logData[task.id] || [];
        var histItems = log.slice().reverse().slice(0, 8);
        var histHtml = histItems.length
          ? histItems.map(function(d) { return "<div>✓ " + escapeHtml(d) + "</div>"; }).join("")
          : "<div>No history yet</div>";

        card.innerHTML =
          '<div class="card-title">' + escapeHtml(task.title) + '</div>' +
          '<div class="card-meta">Every ' + task.freqDays + ' days' + (task.seasonal ? " · seasonal" : "") + '</div>' +
          '<span class="status-badge ' + s.status + '">' + escapeHtml(statusText) + '</span>' +
          '<div class="row"><b>Product:</b> ' + escapeHtml(task.product) + '</div>' +
          '<div class="row"><b>Mix:</b> ' + escapeHtml(task.mix) + '</div>' +
          '<div class="row"><b>How:</b> ' + escapeHtml(task.how) + '</div>' +
          '<div class="row"><b>Last done:</b> ' + (s.last ? escapeHtml(s.last) : "—") + '</div>' +
          '<div class="actions">' +
            '<button class="btn-done" data-id="' + task.id + '">Mark done today</button>' +
            '<button class="btn-hist" data-id="' + task.id + '">History</button>' +
          '</div>' +
          '<div class="hist-panel" id="hist-' + task.id + '">' + histHtml + '</div>';

        grid.appendChild(card);
      });
    });

    if (!anyVisible) {
      grid.innerHTML = '<div class="empty-state">Nothing matches this filter right now.</div>';
    }

    var doneButtons = grid.querySelectorAll(".btn-done");
    for (var i = 0; i < doneButtons.length; i++) {
      doneButtons[i].addEventListener("click", function(e) {
        markDone(e.target.getAttribute("data-id"), e.target);
      });
    }
    var histButtons = grid.querySelectorAll(".btn-hist");
    for (var j = 0; j < histButtons.length; j++) {
      histButtons[j].addEventListener("click", function(e) {
        toggleHist(e.target.getAttribute("data-id"));
      });
    }
  }

  function toggleHist(id) {
    var el = document.getElementById("hist-" + id);
    el.style.display = el.style.display === "block" ? "none" : "block";
  }

  function loadLogs() {
    setSyncStatus("connecting", "Syncing");
    return fetch(REST_URL + "?select=*&order=done_at.asc", { headers: HEADERS })
      .then(function(res) {
        if (!res.ok) {
          return res.text().then(function(t) {
            throw new Error("HTTP " + res.status + ": " + t);
          });
        }
        return res.json();
      })
      .then(function(data) {
        logData = {};
        (data || []).forEach(function(row) {
          if (!logData[row.task_id]) logData[row.task_id] = [];
          logData[row.task_id].push(row.done_at);
        });
        setSyncStatus("synced", "Synced");
        hideError();
      });
  }

  function markDone(id, btn) {
    if (btn) btn.disabled = true;
    var today = new Date().toISOString().slice(0, 10);
    fetch(REST_URL, {
      method: "POST",
      headers: HEADERS,
      body: JSON.stringify({ task_id: id, done_at: today })
    })
    .then(function(res) {
      if (!res.ok) {
        return res.text().then(function(t) {
          throw new Error("HTTP " + res.status + ": " + t);
        });
      }
      if (!logData[id]) logData[id] = [];
      logData[id].push(today);
      render();
    })
    .catch(function(e) {
      showError("Could not save this entry. " + e.message);
      if (btn) btn.disabled = false;
    });
  }

  function setFilter(f) {
    currentFilter = f;
    var btns = document.querySelectorAll(".filters button");
    for (var i = 0; i < btns.length; i++) {
      btns[i].classList.toggle("active", btns[i].getAttribute("data-f") === f);
    }
    render();
  }

  function attachFilterHandlers() {
    var btns = document.querySelectorAll(".filters button");
    for (var i = 0; i < btns.length; i++) {
      btns[i].addEventListener("click", function(e) {
        setFilter(e.target.getAttribute("data-f"));
      });
    }
  }

  function start() {
    hideError();
    setSyncStatus("connecting", "Connecting");
    loadLogs()
      .then(render)
      .catch(function(e) {
        setSyncStatus("error", "Connection failed");
        showError("Could not connect to the database. " + e.message);
      });
  }

  attachFilterHandlers();
  start();
})();
</script>

</body>
</html>
