<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Home Pest Control Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0f1419; --card: #1a2129; --card-border: #2a3441;
    --text: #e6edf3; --muted: #8b949e; --accent: #4fa3ff;
    --ok: #3fb950; --warn: #d29922; --overdue: #f85149;
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--text); padding:20px; }
  h1 { font-size:22px; margin-bottom:2px; }
  .subtitle { color:var(--muted); font-size:13px; margin-bottom:20px; }
  .filters { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
  .filters button { background:var(--card); border:1px solid var(--card-border); color:var(--text); padding:6px 12px; border-radius:20px; font-size:12px; cursor:pointer; }
  .filters button.active { background:var(--accent); color:#08111a; border-color:var(--accent); }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px; }
  .card { background:var(--card); border:1px solid var(--card-border); border-radius:10px; padding:14px 16px; position:relative; overflow:hidden; }
  .card::before { content:""; position:absolute; left:0; top:0; bottom:0; width:5px; }
  .card.ok::before { background:var(--ok); } .card.warn::before { background:var(--warn); }
  .card.overdue::before { background:var(--overdue); } .card.offseason::before { background:#3a3a3a; }
  .card-title { font-size:15px; font-weight:600; margin-bottom:2px; }
  .card-meta { font-size:12px; color:var(--muted); margin-bottom:8px; }
  .status { display:inline-block; font-size:11px; padding:2px 8px; border-radius:12px; font-weight:600; margin-bottom:10px; }
  .status.ok { background:rgba(63,185,80,.15); color:var(--ok); }
  .status.warn { background:rgba(210,153,34,.15); color:var(--warn); }
  .status.overdue { background:rgba(248,81,73,.15); color:var(--overdue); }
  .status.offseason { background:rgba(255,255,255,.06); color:var(--muted); }
  .row { font-size:12.5px; margin:3px 0; color:var(--text); }
  .row b { color:var(--muted); font-weight:500; }
  .actions { margin-top:10px; display:flex; gap:8px; }
  .actions button { flex:1; padding:7px 0; border-radius:6px; border:none; cursor:pointer; font-size:12.5px; font-weight:600; }
  .btn-done { background:var(--accent); color:#08111a; }
  .btn-hist { background:transparent; border:1px solid var(--card-border); color:var(--text); }
  .hist-panel { display:none; margin-top:10px; font-size:11.5px; color:var(--muted); border-top:1px solid var(--card-border); padding-top:8px; max-height:100px; overflow-y:auto; }
  .hist-panel div { margin:2px 0; }
  .section-label { grid-column:1/-1; font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin:18px 0 -4px; }
  .top-bar { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; }
  .sync-status { font-size:11px; color:var(--muted); }
  .banner { max-width:520px; margin:0 auto 20px; padding:14px 16px; border:1px solid var(--overdue); border-radius:10px; background:var(--card); color:var(--text); font-size:13px; display:none; }
</style>
</head>
<body>

<div id="errorBanner" class="banner"></div>

<div id="app">
  <div class="top-bar">
    <div>
      <h1>🏠 Home Pest Control Tracker</h1>
      <div class="subtitle">1981 brick home · Charlotte, NC · Crawlspace + wooded lot program</div>
    </div>
    <div class="sync-status" id="syncStatus">Connecting...</div>
  </div>

  <div class="filters">
    <button class="active" data-f="all" onclick="setFilter('all')">All</button>
    <button data-f="overdue" onclick="setFilter('overdue')">Overdue</button>
    <button data-f="warn" onclick="setFilter('warn')">Due soon</button>
    <button data-f="ok" onclick="setFilter('ok')">On track</button>
  </div>

  <div id="grid" class="grid"></div>
</div>

<script>
const SUPABASE_URL = "https://jfbgmciunsnmmrmkogtf.supabase.co";
const SUPABASE_KEY = "sb_publishable_WItbLaieW0Vqc362h3S1Bw_SoAZHgUw";

const TASKS = [
  { id:'bifenthrin_perimeter', title:'Perimeter Barrier — Bifenthrin 7.9%', category:'Perimeter', freqDays:30, product:'Bifenthrin 7.9% concentrate', mix:'0.5 fl oz/gal routine · 1 fl oz/gal near woods/fence line', how:'Spray 3ft band up foundation + 3ft out on ground, windows, doors, garage frame', seasonal:false },
  { id:'fipronil_crawlspace', title:'Crawlspace/Foundation — Fipronil Plus C 0.65%', category:'Perimeter', freqDays:75, product:'Fipronil Plus C 0.65% concentrate', mix:'1 fl oz per gallon of water', how:'Spray crawlspace vents, foundation gaps, and garage door seams', seasonal:false },
  { id:'yard_granules', title:'Yard Granules — Bifenthrin', category:'Perimeter', freqDays:30, product:'Bifenthrin granules (~0.2%)', mix:'Ready-to-use, spreader on labeled yard-size setting', how:'Broadcast across yard and mulch beds, heavier near wooded border', seasonal:false },
  { id:'alpine_indoor', title:'Indoor/Garage Spray — Alpine WSG', category:'Indoor', freqDays:75, product:'Alpine WSG (10g packet)', mix:'1 packet per gallon of water', how:'Baseboards, under sinks, behind appliances, garage door seams', seasonal:false },
  { id:'gel_bait', title:'Ant & Roach Gel Bait — Advion', category:'Indoor', freqDays:45, product:'Advion Ant Gel + Advion Cockroach Gel', mix:'Ready-to-use, no mixing', how:'Pea-sized dabs in cracks, corners, under appliances', seasonal:false },
  { id:'mosquito_dunks', title:'Mosquito Dunks — Standing Water', category:'Mosquito', freqDays:30, product:'Mosquito Dunks (Bti)', mix:'1 dunk per 100 sq ft of water surface', how:'Drop into dry creek bed puddles / standing water spots', seasonal:true, seasonStart:4, seasonEnd:10 },
  { id:'mosquito_barrier', title:'Mosquito Barrier Spray — Bifenthrin', category:'Mosquito', freqDays:25, product:'Bifenthrin 7.9% concentrate', mix:'1 fl oz per gallon of water', how:'Spray shrubs, tall grass, shaded areas along tree line', seasonal:true, seasonStart:4, seasonEnd:10 },
  { id:'wasp_check', title:'Wasp Nest Check', category:'Wasps', freqDays:30, product:'Spectracide / PT Ultra Wasp Freeze (as needed)', mix:'Ready-to-use aerosol, no mixing', how:'Inspect eaves, garage rafters, fence lines; treat any nest at dusk', seasonal:true, seasonStart:3, seasonEnd:8 },
  { id:'crawlspace_traps', title:'Crawlspace Trap Check', category:'Rodent', freqDays:30, product:'Snap traps / glue boards', mix:'Pre-loaded, no mixing', how:'Check traps near pipe/vent penetrations, reset as needed', seasonal:false },
  { id:'rodent_stations', title:'Exterior Rodent Bait Stations', category:'Rodent', freqDays:60, product:'Tomcat / Protecta LP bait stations', mix:'Pre-loaded blocks, no mixing', how:'Place/refresh along exterior foundation, ahead of fall/winter', seasonal:true, seasonStart:9, seasonEnd:12 }
];

let supabase = null;
let currentFilter = 'all';
let logData = {};

function showError(msg) {
  const el = document.getElementById('errorBanner');
  el.textContent = msg;
  el.style.display = 'block';
}

function daysBetween(a, b) { return Math.round((b - a) / (1000*60*60*24)); }

function isInSeason(task) {
  if (!task.seasonal) return true;
  const m = new Date().getMonth() + 1;
  return m >= task.seasonStart && m <= task.seasonEnd;
}

function getStatus(task) {
  const log = logData[task.id] || [];
  if (!isInSeason(task)) return { status:'offseason', daysLeft:null, last: log[log.length-1] || null };
  const last = log.length ? new Date(log[log.length-1]) : null;
  const today = new Date();
  if (!last) return { status:'overdue', daysLeft:0, last:null };
  const daysSince = daysBetween(last, today);
  const daysLeft = task.freqDays - daysSince;
  let status = 'ok';
  if (daysLeft <= 0) status = 'overdue';
  else if (daysLeft <= 5) status = 'warn';
  return { status, daysLeft, last: log[log.length-1] };
}

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const categories = [...new Set(TASKS.map(t => t.category))];
  categories.forEach(cat => {
    const catTasks = TASKS.filter(t => t.category === cat);
    const visibleTasks = catTasks.filter(t => {
      const s = getStatus(t).status;
      return currentFilter === 'all' || s === currentFilter;
    });
    if (visibleTasks.length === 0) return;
    const label = document.createElement('div');
    label.className = 'section-label';
    label.textContent = cat;
    grid.appendChild(label);
    visibleTasks.forEach(task => {
      const { status, daysLeft, last } = getStatus(task);
      const card = document.createElement('div');
      card.className = 'card ' + status;
      let statusText = '';
      if (status === 'offseason') statusText = 'Off-season';
      else if (status === 'overdue') statusText = last ? `Overdue by ${-daysLeft}d` : 'Never logged';
      else if (status === 'warn') statusText = `Due in ${daysLeft}d`;
      else statusText = `On track (${daysLeft}d left)`;
      const log = logData[task.id] || [];
      const histHtml = log.slice().reverse().slice(0,8).map(d => `<div>✓ ${d}</div>`).join('') || '<div>No history yet</div>';
      card.innerHTML = `
        <div class="card-title">${task.title}</div>
        <div class="card-meta">Every ${task.freqDays} days${task.seasonal ? ' · seasonal' : ''}</div>
        <span class="status ${status}">${statusText}</span>
        <div class="row"><b>Product:</b> ${task.product}</div>
        <div class="row"><b>Mix:</b> ${task.mix}</div>
        <div class="row"><b>How:</b> ${task.how}</div>
        <div class="row"><b>Last done:</b> ${last ? last : '—'}</div>
        <div class="actions">
          <button class="btn-done" onclick="markDone('${task.id}')">Mark done today</button>
          <button class="btn-hist" onclick="toggleHist('${task.id}')">History</button>
        </div>
        <div class="hist-panel" id="hist-${task.id}">${histHtml}</div>
      `;
      grid.appendChild(card);
    });
  });
  if (grid.innerHTML === '') {
    grid.innerHTML = '<div style="color:var(--muted);grid-column:1/-1;text-align:center;padding:40px;">Nothing matches this filter right now 🎉</div>';
  }
}

async function loadLogs() {
  document.getElementById('syncStatus').textContent = 'Syncing...';
  try {
    const { data, error } = await supabase.from('pest_logs').select('*').order('done_at', {ascending:true});
    if (error) throw error;
    logData = {};
    (data || []).forEach(row => {
      if (!logData[row.task_id]) logData[row.task_id] = [];
      logData[row.task_id].push(row.done_at);
    });
    document.getElementById('syncStatus').textContent = '✓ Synced';
  } catch (e) {
    document.getElementById('syncStatus').textContent = '⚠️ Sync error';
    showError('Could not load data from the database. Details: ' + (e.message || e));
    console.error(e);
  }
}

async function markDone(id) {
  const today = new Date().toISOString().slice(0,10);
  try {
    const { error } = await supabase.from('pest_logs').insert({ task_id: id, done_at: today });
    if (error) throw error;
    if (!logData[id]) logData[id] = [];
    logData[id].push(today);
    render();
  } catch (e) {
    showError('Could not save this entry. Details: ' + (e.message || e));
    console.error(e);
  }
}

function toggleHist(id) {
  const el = document.getElementById('hist-' + id);
  el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
  document.querySelector(`.filters button[data-f="${f}"]`).classList.add('active');
  render();
}

async function start() {
  try {
    if (!window.supabase) throw new Error('Supabase library failed to load. Check your internet connection.');
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    await loadLogs();
    render();
  } catch (e) {
    showError('App failed to start. Details: ' + (e.message || e));
    console.error(e);
  }
}

start();
</script>

</body>
</html>
